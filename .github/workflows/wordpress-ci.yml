name: WordPress CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: wp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wordpress-validate:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysql, zip, gd, mbstring, curl, xml, intl
          coverage: xdebug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install PHP dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Run PHP tests
        run: composer test

      - name: PHP CodeSniffer
        run: composer lint

      - name: Build assets
        run: |
          npm run build
          npm run build:blocks

      - name: Lint JavaScript/TypeScript
        run: npm run lint:js

      - name: Test JavaScript/TypeScript
        run: npm run test:js
