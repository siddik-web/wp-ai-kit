name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: npm audit
        run: npm audit --omit=dev --audit-level=high

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

