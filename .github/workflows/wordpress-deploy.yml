name: WordPress Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy'
        required: false
        type: string
      skip_tests:
        description: 'Skip pre-deployment tests'
        required: false
        default: false
        type: boolean

  release:
    types: [published]

jobs:
  wordpress-deploy-validation:
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysql, zip, gd, mbstring, curl, xml, intl

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci

      - name: Run tests
        run: |
          composer test
          npm run test:unit

      - name: Build assets
        run: npm run build:production

      - name: Validate deployment package
        run: |
          # Check file permissions
          find . -type f -name "*.php" -exec php -l {} \;

          # Validate WordPress compatibility
          php -r "
          \$plugin_file = glob('*.php')[0] ?? null;
          if (\$plugin_file) {
            \$content = file_get_contents(\$plugin_file);
            if (preg_match('/Requires at least: ([0-9.]+)/', \$content, \$matches)) {
              \$required_wp = \$matches[1];
              echo \"Requires WordPress \$required_wp+\n\";
            }
            if (preg_match('/Tested up to: ([0-9.]+)/', \$content, \$matches)) {
              \$tested_wp = \$matches[1];
              echo \"Tested up to WordPress \$tested_wp\n\";
            }
          }
          "

  wordpress-deploy-staging:
    runs-on: ubuntu-latest
    needs: wordpress-deploy-validation
    if: github.event.inputs.environment == 'staging' || github.event_name == 'release'

    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysql, zip, gd, mbstring, curl, xml, intl

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci

      - name: Build for production
        run: npm run build:production

      - name: Create deployment package
        run: |
          # Create clean deployment package
          mkdir -p deploy
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='tests' --exclude='.github' --exclude='*.log' ./ deploy/
          cd deploy && zip -r ../${{ github.event.repository.name }}-${{ github.sha }}.zip .

      - name: Deploy to WP Engine staging
        if: vars.DEPLOY_TARGET == 'wpengine'
        run: |
          echo "Deploying to WP Engine staging..."
          # Install WP-CLI
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

          # Deploy using WP-CLI or rsync
          rsync -avz --delete --exclude='.git' deploy/ ${{ secrets.WPENGINE_STAGING_SSH }}:sites/${{ github.event.repository.name }}/

      - name: Deploy to Kinsta staging
        if: vars.DEPLOY_TARGET == 'kinsta'
        run: |
          echo "Deploying to Kinsta staging..."
          # Use Kinsta API or git-based deployment
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.KINSTA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"${{ github.ref_name }}\", \"deployment_type\":\"manual\"}" \
            https://api.kinsta.com/v2/sites/${{ vars.KINSTA_SITE_ID }}/deployments

      - name: Deploy to custom staging
        if: vars.DEPLOY_TARGET == 'custom'
        run: |
          echo "Deploying to custom staging server..."
          rsync -avz --delete deploy/ ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_PATH }}/

      - name: Run database migrations
        run: |
          # Run any pending migrations
          wp --path=${{ secrets.STAGING_PATH }} plugin activate ${{ github.event.repository.name }}
          wp --path=${{ secrets.STAGING_PATH }} ${{ github.event.repository.name }} migrate

      - name: Clear caches
        run: |
          # Clear WordPress caches
          wp --path=${{ secrets.STAGING_PATH }} cache flush
          wp --path=${{ secrets.STAGING_PATH }} transient delete --all

      - name: Run smoke tests
        run: |
          # Basic functionality tests
          curl -f ${{ secrets.STAGING_URL }}/wp-admin/ || exit 1
          wp --path=${{ secrets.STAGING_PATH }} plugin status ${{ github.event.repository.name }} | grep -q "Active" || exit 1

      - name: Notify deployment
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ Staging deployment completed for ${{ github.event.repository.name }} ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK }}

  wordpress-deploy-production:
    runs-on: ubuntu-latest
    needs: wordpress-deploy-staging
    if: github.event.inputs.environment == 'production' && github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysql, zip, gd, mbstring, curl, xml, intl

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci

      - name: Build for production
        run: npm run build:production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='tests' --exclude='.github' ./ deploy/
          cd deploy && zip -r ../${{ github.event.repository.name }}-${{ github.sha }}.zip .

      - name: Backup production database
        run: |
          # Create database backup before deployment
          wp --path=${{ secrets.PRODUCTION_PATH }} db export production-backup-$(date +%Y%m%d-%H%M%S).sql

      - name: Deploy to production
        run: |
          # Deploy to production environment
          rsync -avz --delete --backup --backup-dir=backups/$(date +%Y%m%d-%H%M%S) \
            deploy/ ${{ secrets.PRODUCTION_SSH_USER }}@${{ secrets.PRODUCTION_HOST }}:${{ secrets.PRODUCTION_PATH }}/

      - name: Run database migrations
        run: |
          wp --path=${{ secrets.PRODUCTION_PATH }} plugin activate ${{ github.event.repository.name }}
          wp --path=${{ secrets.PRODUCTION_PATH }} ${{ github.event.repository.name }} migrate

      - name: Clear production caches
        run: |
          wp --path=${{ secrets.PRODUCTION_PATH }} cache flush
          wp --path=${{ secrets.PRODUCTION_PATH }} transient delete --all

          # Clear any external caches (Cloudflare, etc.)
          curl -X POST "${{ secrets.CLOUDFLARE_API_URL }}/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Health checks
        run: |
          # Comprehensive health checks
          curl -f --max-time 30 ${{ secrets.PRODUCTION_URL }}/ || exit 1
          wp --path=${{ secrets.PRODUCTION_PATH }} plugin status ${{ github.event.repository.name }} | grep -q "Active" || exit 1

          # Check for PHP errors
          wp --path=${{ secrets.PRODUCTION_PATH }} eval "echo 'PHP OK';" || exit 1

      - name: Performance monitoring
        run: |
          # Run performance tests
          curl -w "@curl-format.txt" -o /dev/null -s ${{ secrets.PRODUCTION_URL }}/ > performance.log

      - name: Notify production deployment
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚀 Production deployment completed for ${{ github.event.repository.name }} ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          # Implement rollback logic here
          # Restore from backup, revert files, etc.

  wordpress-post-deploy:
    runs-on: ubuntu-latest
    needs: [wordpress-deploy-staging, wordpress-deploy-production]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate deployment report
        run: |
          echo "# Deployment Report" > deployment-report.md
          echo "- Repository: ${{ github.repository }}" >> deployment-report.md
          echo "- Commit: ${{ github.sha }}" >> deployment-report.md
          echo "- Environment: ${{ github.event.inputs.environment || 'staging' }}" >> deployment-report.md
          echo "- Timestamp: $(date)" >> deployment-report.md
          echo "- Status: ${{ job.status }}" >> deployment-report.md

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md

      - name: Notify team
        if: always()
        run: |
          STATUS="✅ Success"
          if [ "${{ job.status }}" = "failure" ]; then
            STATUS="❌ Failed"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${STATUS} Deployment finished for ${{ github.event.repository.name }} - View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}