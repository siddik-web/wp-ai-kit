name: Conventions

on:
  pull_request:

jobs:
  conventions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enforce file naming
        run: |
          find src -type f | grep '[A-Z]' && \
          echo "Uppercase filenames not allowed" && exit 1 || true

      - name: Prevent deep relative imports
        run: |
          if grep -R "\.\./\.\./\.\./" src
          then
            echo "Deep relative imports detected"
            exit 1
          fi

